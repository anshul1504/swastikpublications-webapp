{% extends 'base.html' %}
{% block content %}
<h3>Reset Password</h3>
<p>Enter your registered email. We will send reset link.</p>

<form method="post">{% csrf_token %}
  {{ form.email.label }}  
  {{ form.email }}
  <button class="btn btn-primary mt-2">Send Reset Link</button>
</form>
{% endblock %}
